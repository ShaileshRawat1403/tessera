# Run the test suite on every push to main and every pull request.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install all packages
        run: |
          python -m pip install --upgrade pip
          pip install $(for p in packages/*/; do printf -- "-e %s " "$p"; done) pytest
      - name: Run tests
        run: pytest -q
