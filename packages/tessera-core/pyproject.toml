[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "tesserakit-core"
version = "0.3.1"
description = "Core runtime for reusable AI and engineering workflow SDK tools."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Shailesh Rawat" }]
dependencies = [
  "typer>=0.12",
  "rich>=13.7",
  "pyyaml>=6.0",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/ShaileshRawat1403/tessera"
Repository = "https://github.com/ShaileshRawat1403/tessera"
Issues = "https://github.com/ShaileshRawat1403/tessera/issues"

[project.scripts]
tessera = "tessera_core.cli:main"

[project.entry-points."tessera.jobpacks"]
example = "tessera_core.example_pack:create_pack"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/tessera_core"]
