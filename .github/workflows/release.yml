# Publish all packages to PyPI when a v* tag is pushed.
#
# Auth: PyPI Trusted Publishing (OIDC). No token is stored anywhere; GitHub
# proves this workflow's identity to PyPI directly. One-time setup per project:
# see docs/PUBLISHING.md ("Trusted Publishing setup").
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - name: Build wheel + sdist for every package
        run: |
          for pkg in packages/*/; do
            python -m build --outdir dist "$pkg"
          done
          echo "built $(ls dist | wc -l) artifacts"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing; nothing else granted
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
