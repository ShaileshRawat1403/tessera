[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "tesserakit-todo"
version = "0.4.0"
description = "Todo job pack for Tessera: scan source for TODO/FIXME-style markers into a triaged backlog."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Shailesh Rawat" }]
dependencies = [
  "tesserakit-core>=0.1.0",
  "typer>=0.12",
  "rich>=13.7",
  "pydantic>=2.7",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/ShaileshRawat1403/tessera"
Repository = "https://github.com/ShaileshRawat1403/tessera"
Issues = "https://github.com/ShaileshRawat1403/tessera/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.entry-points."tessera.commands"]
todo = "tessera_todo.cli:register"

[project.entry-points."tessera.jobpacks"]
todo = "tessera_todo.pack:create_pack"

[tool.hatch.build.targets.wheel]
packages = ["src/tessera_todo"]
