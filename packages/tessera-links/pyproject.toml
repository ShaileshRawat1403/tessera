[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "tesserakit-links"
version = "0.3.0"
description = "Links job pack for Tessera: check markdown links for broken file links, dead anchors, and orphan docs."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Tessera" }]
dependencies = [
  "tesserakit-core>=0.1.0",
  "typer>=0.12",
  "rich>=13.7",
  "pydantic>=2.7",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.entry-points."tessera.commands"]
links = "tessera_links.cli:register"

[project.entry-points."tessera.jobpacks"]
links = "tessera_links.pack:create_pack"

[tool.hatch.build.targets.wheel]
packages = ["src/tessera_links"]
