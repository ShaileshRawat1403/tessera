[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "tesserakit-changelog"
version = "0.3.1"
description = "Changelog job pack for Tessera: turn git history into a structured changelog and release notes."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Tessera" }]
dependencies = [
  "tesserakit-core>=0.1.0",
  "typer>=0.12",
  "rich>=13.7",
  "pydantic>=2.7",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.entry-points."tessera.commands"]
changelog = "tessera_changelog.cli:register"

[project.entry-points."tessera.jobpacks"]
changelog = "tessera_changelog.pack:create_pack"

[tool.hatch.build.targets.wheel]
packages = ["src/tessera_changelog"]
