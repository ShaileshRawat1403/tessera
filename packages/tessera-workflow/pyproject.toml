[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "tesserakit-workflow"
version = "0.3.1"
description = "Workflow Pack profile validator — governance schema for Tessera JobPack-based workflows."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Shailesh Rawat" }]
dependencies = [
  "tesserakit-core>=0.3.1",
  "pydantic>=2.0",
  "pyyaml>=6.0",
  "typer>=0.12",
  "rich>=13.7",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/ShaileshRawat1403/tessera"
Repository = "https://github.com/ShaileshRawat1403/tessera"
Issues = "https://github.com/ShaileshRawat1403/tessera/issues"

[project.entry-points."tessera.commands"]
workflow = "tessera_workflow.cli:register"

[project.entry-points."tessera.jobpacks"]
workflow = "tessera_workflow.pack:create_pack"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/tessera_workflow"]
